<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>F-16Zebra</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2800/2800258.png">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f5f5f7; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <iframe id="mainFrame" src=""></iframe>

  <script>
    // 🔒 ดึงข้อมูลความจำระบบมือถือ แยกจากเครื่อง iPad ของเดิม
    const savedBranch = localStorage.getItem('mobile_branch') || '';
    const savedShop = localStorage.getItem('mobile_shop') || '';
    const savedStaff = localStorage.getItem('mobile_staff') || '';
    const savedStaffName = localStorage.getItem('mobile_staffName') || '';
    const isRegistered = localStorage.getItem('mobile_registered') || 'false';

    // 🟢 ลิงก์สคริปต์ F-16 Clean ล่าสุดที่คุณพี่ส่งมา
    const gasBaseUrl = "https://script.google.com/macros/s/AKfycby4LshWMWz-gamwl0KMCkglLnof828KXhusLHQZXWvk-0eQFT_FX3iwey_dN-YUetcO/exec";
    
    // 🚀 ส่งต่อข้อมูลสาขาเข้าไปในระบบล็อกอินอัตโนมัติ
    const finalUrl = gasBaseUrl + "?branch=" + encodeURIComponent(savedBranch) + 
                     "&shop=" + encodeURIComponent(savedShop) + 
                     "&staff=" + encodeURIComponent(savedStaff) + 
                     "&staffName=" + encodeURIComponent(savedStaffName) + 
                     "&reg=" + isRegistered;
                     
    document.getElementById('mainFrame').src = finalUrl;

    // ระบบจัดการตู้เซฟความจำเวลาสลับกะพนักงาน
    window.addEventListener('message', function(event) {
      if (!event.data) return;
      const data = event.data;
      
      if (data.action === 'save_mobile') {
        localStorage.setItem('mobile_registered', 'true');
        localStorage.setItem('mobile_branch', data.branch);
        localStorage.setItem('mobile_shop', data.shop);
        localStorage.setItem('mobile_staff', data.staff);
        localStorage.setItem('mobile_staffName', data.staffName);
      } 
      else if (data.action === 'logout_mobile') {
        // เคลียร์รหัสพนักงานออกเวลากด Sign Out แต่ยังล็อกความจำสาขาของมือถือเครื่องนั้นไว้เหมือนเดิม
        localStorage.setItem('mobile_staff', '');
        localStorage.setItem('mobile_staffName', '');
      }
    });
  </script>
</body>
</html>
