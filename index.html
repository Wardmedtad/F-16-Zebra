<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>F-16 Hub</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="F-16 Hub">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2800/2800258.png">

  <meta name="theme-color" content="#f5f5f7">
  <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiRi0xNiBIdWIiLCJzaG9ydF9uYW1lIjoiRi0xNiBIdWIiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjZjVmNWY3IiwidGhlbWVfY29sb3ciOiIjMDA3MWUzIn0=">

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f5f5f7; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="app-frame" allow="fullscreen"></iframe>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby4LshWMWz-gamwl0KMCkglLnof828KXhusLHQZXWvk-0eQFT_FX3iwey_dN-YUetcO/exec"; 

    // ดึงความจำจากตู้เซฟ GitHub
    let savedBranch = localStorage.getItem('hub_branch') || '';
    let savedShop = localStorage.getItem('hub_shop') || '';
    let savedStaff = localStorage.getItem('hub_staff') || '';
    let savedReg = localStorage.getItem('hub_reg') || '';

    // แนบความจำส่งให้ Google
    let finalUrl = GAS_URL + "?v=" + Date.now();
    if (savedBranch) finalUrl += "&branch=" + encodeURIComponent(savedBranch);
    if (savedShop) finalUrl += "&shop=" + encodeURIComponent(savedShop);
    if (savedStaff) finalUrl += "&staff=" + encodeURIComponent(savedStaff);
    if (savedReg) finalUrl += "&reg=" + encodeURIComponent(savedReg);

    document.getElementById('app-frame').src = finalUrl;

    // รับคำสั่งเซฟความจำจาก Google
    window.addEventListener('message', function(event) {
      if (event.data) {
        if (event.data.action === 'save_all') {
          localStorage.setItem('hub_branch', event.data.branch);
          localStorage.setItem('hub_shop', event.data.shop);
          localStorage.setItem('hub_staff', event.data.staff);
          localStorage.setItem('hub_reg', 'true');
        } else if (event.data.action === 'logout_staff') {
          localStorage.removeItem('hub_staff');
        }
      }
    });
  </script>
</body>
</html>
