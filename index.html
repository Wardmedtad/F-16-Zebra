<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>F-16 Hub</title>

  <meta name="theme-color" content="#1e293b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --primary: #1e293b;
      --accent: #2563eb;
      --pending: #f59e0b;
      --bg: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #0f172a;
      padding: 12px;
      width: 100%;
      overflow-x: hidden;
    }

    .d-none { display: none !important; }

    #staffInfo { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: #fff; padding: 14px 16px; border-radius: 14px; margin-bottom: 14px; }
    #branchNameText { font-weight: 700; color: #60a5fa; }
    #staffNameText { font-weight: 700; color: #38bdf8; }

    .queue-container { display: flex; flex-direction: column; gap: 16px; padding-bottom: 30px; }
    .card { width: 100%; background: #fff; border-radius: 18px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 10px solid var(--pending); }
    .q-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .qnum { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; }
    .status-badge { background: #fef3c7; color: #92400e; padding: 4px 14px; border-radius: 20px; font-size: 14px; font-weight: 700; }
    .customer-info { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .service-detail { background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 18px; font-size: 16px; line-height: 1.6; }
    .btn-done { width: 100%; background: var(--accent); color: #fff; border: none; padding: 20px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

  <div id="queueSection">
    <div id="staffInfo">
      <div>
        <div style="font-weight: 600; font-size: 15px;">🏪 รหัสสาขา: <span id="branchNameText">กำลังเชื่อมต่อ...</span></div>
        <div style="font-weight: 600; margin-top: 2px; font-size: 15px;">👩‍💼 ผู้ปฏิบัติงาน: <span id="staffNameText">กำลังเชื่อมต่อ...</span></div>
      </div>
    </div>
    <div id="queueList" class="queue-container">⏳ กำลังดึงรายการคิวล้างแว่นจากฐานข้อมูล...</div>
  </div>

  <audio id="ding" src="https://assets.mixkit.co/sfx/preview/mixkit-interface-option-select-2573.mp3" preload="auto"></audio>

  <script>
    // 🔗 1. ดักจับและดึงค่ารหัสสาขา/พนักงาน จากพารามิเตอร์ลิงก์ของระบบล็อกอินหลัก ZebraOS ทันที
    let urlParams = new URLSearchParams(window.location.search);
    let currentBranch = urlParams.get('branch') || urlParams.get('urlBranch') || "206";
    let currentStaff = urlParams.get('staff') || urlParams.get('urlStaffName') || "Staff";

    // 🌐 2. วางลิงก์ Web App (URL จาก Google Apps Script ที่พี่ก๊อปปี้มาจากขั้นตอนแรก) ที่นี่แทนที่ลิงก์เดิมครับ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4LshWMWz-gamwl0KMcKglLnof828KXhusLHQZXWvk-0eQFT_FX3iwey_dN-jR8799/exec";

    window.onload = function() {
      document.getElementById("branchNameText").textContent = currentBranch;
      document.getElementById("staffNameText").textContent = currentStaff;
      
      loadQueue();
      setInterval(loadQueue, 5000); // อัปเดตตารางคิวอัตโนมัติให้สดใหม่ทุกๆ 5 วินาที
    };

    let played = new Set();

    function loadQueue() {
      if(!currentBranch) return;
      
      // ส่งคำขอแบบ Fetch ดึงข้อมูลข้ามโดเมนจากตารางชีตหลังบ้านโดยตรง
      fetch(`${SCRIPT_URL}?action=getQueue&branch=${currentBranch}`)
        .then(response => response.json())
        .then(data => {
          render(data);
        })
        .catch(err => {
          document.getElementById("queueList").innerHTML = "<div style='text-align:center; padding:50px; color:#64748b;'>🎉 ไม่มีคิวค้างรอล้างในขณะนี้</div>";
        });
    }

    function render(list) {
      const listDiv = document.getElementById("queueList");
      if (!list || !list.length) {
        listDiv.innerHTML = "<div style='text-align:center; padding:50px; color:#94a3b8; font-weight: 600; font-size:16px;'>🎉 ล้างครบทุกคิวแล้ว</div>";
        return;
      }
      listDiv.innerHTML = list.map(q => `
        <div class="card">
          <div class="q-head">
            <div class="qnum">คิวที่ ${q.queueNumber}</div>
            <div class="status-badge">⌛ รอล้าง</div>
          </div>
          <div class="customer-info">คุณ${q.name}</div>
          <div class="service-detail">
            📱 <b>เบอร์:</b> ${q.phone}<br>
            👓 <b>รุ่น:</b> ${q.model || '-'}<br>
            🛠️ <b>บริการ:</b> ${q.service.replace(/,/g, " / ")}
          </div>
          <button class="btn-done" onclick="markDone('${q.queueId}', this)">🧼 ล้างเสร็จแล้ว</button>
        </div>
      `).join("");
    }

    function markDone(id, btnElement) {
      btnElement.innerHTML = "กำลังบันทึก...";
      btnElement.disabled = true;
      
      fetch(`${SCRIPT_URL}?action=updateStatus&id=${id}&status=Done&staff=${currentStaff}&branch=${currentBranch}`)
        .then(response => response.json())
        .then(() => {
           loadQueue();
        })
        .catch(() => {
           loadQueue();
        });
    }
  </script>
</body>
</html>
